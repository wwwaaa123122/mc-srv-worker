<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MC 免端口域名生成器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css?v=3">
</head>
<body>

  <!-- Animated background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div class="app-wrapper">

    <!-- Header -->
    <header class="header">
      <div class="header-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1 class="header-title">MC 免端口域名</h1>
      <p class="header-subtitle">为你的 Minecraft 服务器生成带 SRV 记录的免端口域名</p>
    </header>

    <!-- Card: 创建域名 -->
    <div class="card">
      <div class="card-header">
        <span class="card-badge badge-create">创建</span>
        <h2 class="card-title">生成新域名</h2>
      </div>
      <div class="card-body">
        <div class="input-group">
          <label class="input-label" for="address">服务器地址</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
              <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
              <line x1="6" y1="6" x2="6.01" y2="6"/>
              <line x1="6" y1="18" x2="6.01" y2="18"/>
            </svg>
            <input id="address" type="text" placeholder="example.com:25565 或 1.1.1.1:25565" autocomplete="off">
          </div>
        </div>
        <div class="input-group">
          <label class="input-label" for="prefix">自定义前缀 <span class="optional">(可选)</span></label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
            <input id="prefix" type="text" placeholder="留空则自动生成" autocomplete="off">
          </div>
        </div>
        <button class="btn btn-primary" onclick="create()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
          <span>生成域名</span>
        </button>
      </div>
    </div>

    <!-- Card: 管理域名 -->
    <div class="card">
      <div class="card-header">
        <span class="card-badge badge-manage">管理</span>
        <h2 class="card-title">修改 / 删除解析</h2>
      </div>
      <div class="card-body">
        <div class="input-group">
          <label class="input-label" for="sub">前缀</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12a9 9 0 1 1-9-9"/>
              <path d="M12 6v6l3 2"/>
            </svg>
            <input id="sub" type="text" placeholder="生成时返回的前缀" autocomplete="off">
          </div>
        </div>
        <div class="input-group">
          <label class="input-label" for="newAddress">新地址</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
              <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
              <line x1="6" y1="6" x2="6.01" y2="6"/>
              <line x1="6" y1="18" x2="6.01" y2="18"/>
            </svg>
            <input id="newAddress" type="text" placeholder="example.com:25565" autocomplete="off">
          </div>
        </div>
        <div class="input-group">
          <label class="input-label" for="authCode">授权码</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input id="authCode" type="text" placeholder="生成时返回的授权码" autocomplete="off">
          </div>
        </div>
        <div class="btn-group">
          <button class="btn btn-accent" onclick="update()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/>
              <polyline points="1 20 1 14 7 14"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
            <span>修改解析</span>
          </button>
          <button class="btn btn-danger" onclick="deleteRecord()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
            <span>删除解析</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Result -->
    <div id="result" class="result-panel hidden"></div>

  </div>

  <!-- Footer -->
  <footer class="footer">
    <span>遇到问题？</span>
    <a href="mailto:wwwaaa123122@outlook.com">联系作者</a>
  </footer>

  <script src="./app.js?v=3"></script>
</body>
</html>
